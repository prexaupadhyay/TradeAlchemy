
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeAlchemy | Intelligent Market Analysis</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="dashboard.html" class="logo-link">
                <div class="logo">
                    <img src="/static/images/logo.png" alt="TradeAlchemy Logo" class="logo-img">
                    <span class="logo-text">TradeAlchemy</span>
                </div>
            </a>

            <nav class="nav">
                <a href="dashboard.html" class="nav-link active">Home</a>
                <a href="watchlist.html" class="nav-link">Watchlist</a>
            </nav>

            <div class="header-actions">
                <a href="account.html" class="account-link">
                    <div class="account-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                </a>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="hero-wrapper">
            <div class="hero">
                <div class="hero-logo-container">
                    <img src="/static/images/logo.png" alt="TradeAlchemy Logo" class="hero-logo-img">
                    <h1 class="hero-title">Trade<span class="title-gradient">Alchemy</span></h1>
                    <p class="hero-tagline">Transmuting raw data into market wealth.</p>
                </div>

                <div class="search-bar-wrapper">
                    <div class="search-bar">
                        <div class="ai-dropdown-container">
                            <button class="ai-mode-btn" id="modeBtn">
                                <svg class="search-icon-btn" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                                </svg>
                                <span id="btnText">General</span>
                                <svg class="chevron-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                            </button>

                            <div class="dropdown-menu">
                                <div class="dropdown-item active" onclick="selectMode('General', this)">
                                    <svg class="item-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                                    </svg>
                                    General
                                </div>
                                <div class="dropdown-item" onclick="selectMode('AI Prediction', this)">
                                    <svg class="sparkle-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z" /></svg>
                                    AI Prediction
                                </div>
                            </div>
                        </div>

                        <div class="search-divider"></div>
                        <input type="text" id="searchInput" class="search-input" placeholder="Search for a company or type a ticker">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-wrapper">
            <div class="footer-left">
                <a href="dashboard.html" class="logo-link">
                    <div class="logo">
                        <img src="/static/images/logo.png" alt="Logo" class="logo-img">
                        <span class="logo-text">TradeAlchemy</span>
                    </div>
                </a>
                <p class="footer-description">Semester 3 Project</p>
            </div>
            <div class="footer-right">
                <div class="footer-col">
                    <h4>Learn</h4>
                    <a href="stock_market.html">Stock Market</a>
                    <a href="ai_ml.html">AI ML</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        let currentMode = 'General';

        function selectMode(modeName, element) {
            currentMode = modeName;
            document.getElementById('btnText').innerText = modeName;
            const btnIcon = document.querySelector('.ai-mode-btn .search-icon-btn');
            if (modeName === 'AI Prediction') {
                btnIcon.innerHTML = '<path d="M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z" />';
                btnIcon.classList.add('sparkle-icon');
            } else {
                btnIcon.innerHTML = '<path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>';
                btnIcon.classList.remove('sparkle-icon');
            }
            document.querySelectorAll('.dropdown-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
        }

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const query = searchInput.value;
                if(query.trim() === "") return;
                if (currentMode === 'AI Prediction') {
                    window.location.href = `ai_prediction.html?q=${encodeURIComponent(query)}`;
                } else {
                    window.location.href = `search.html?q=${encodeURIComponent(query)}`;
                }
            }
        });
    </script>
</body>
</html>
